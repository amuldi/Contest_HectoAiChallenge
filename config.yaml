# [경로 설정]
# 학습 데이터 경로 (이 안에 real, fake 폴더가 있어야 함)
TRAIN_DATA_DIR: "./train_data/train"

# 대회용 테스트 데이터 경로
TEST_DATA_DIR: "./test_data"

# 모델 저장 위치
MODEL_SAVE_PATH: "./model/best_model.h5"

# 결과 제출 파일 이름
SUBMISSION_PATH: "submission.csv"

# [하이퍼파라미터]
IMG_SIZE: 299
BATCH_SIZE: 32
EPOCHS: 10
LEARNING_RATE: 0.0002
SEED: 42